name: Gerar Sinal WDO

on:
  schedule:
    # 11:55 UTC = 08:55 BRT (UTC-3) — dias úteis
    - cron: '55 11 * * 1-5'
  workflow_dispatch:

jobs:
  gerar-sinal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Gerar sinal via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python signal_wdo.py

      - name: Gerar backtest
        run: python backtest.py

      - name: Commit e push
        run: |
          git config user.name  "WDO Signal Bot"
          git config user.email "bot@github-actions"
          # Guarda os arquivos gerados fora do repo
          cp signal.json  /tmp/signal.json
          cp backtest.json /tmp/backtest.json
          # Sincroniza com o estado atual do remote (sem risco de conflito)
          git fetch origin main
          git reset --hard origin/main
          # Restaura os arquivos gerados
          cp /tmp/signal.json  signal.json
          cp /tmp/backtest.json backtest.json
          # Commita e envia
          git add signal.json backtest.json
          git diff --staged --quiet && echo "Sem alterações." && exit 0
          git commit -m "sinal+backtest: $(TZ='America/Sao_Paulo' date +'%Y-%m-%d %H:%M') BRT"
          git push origin main
